<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple-text-area</title>
    <link rel="stylesheet" href="./dist/output.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">
</head>

<body style="background-color:#D3D3D3 ;" class="h-screen flex flex-col justify-center items-center">
    <div class="flex flex-col bg-white rounded-2xl p-7 md:w-110 lg:w-130">
        <h1 class="text-center text-2xl font-bold mb-3">Message</h1>
        <div class="flex flex-col relative">
            <textarea name="" id="one" placeholder="Type Something... "
                class=" p-2 border rounded  md:w-95 lg:w-115 h-40 resize-none"></textarea>
            <p id="five" class="absolute left-40 md:left-83 lg:left-103 top-33 text-sm text-gray-500">0/200</p>
        </div>
        <p class="text-sm text-gray-500">200 Characters Max</p>
        <p id="four"></p>
        <div class="mt-3">
            <button id="two" class="w-24 border p-2 rounded bg-blue-500 text-white hover:bg-blue-900 mr-2"><i
                    class="fa-regular fa-copy mr-1"></i>Copy</button>
            <button id="three" class="w-24 border p-2 rounded bg-blue-500 text-white hover:bg-blue-900"><i
                    class="fa-solid fa-eraser mr-1"></i>Clear</button>

        </div>

    </div>

    <script>
        var a = document.getElementById("one")
        var b = document.getElementById("two")
        var c = document.getElementById("three")
        var d = document.getElementById("four")
        var e=document.getElementById("five")

        a.addEventListener('input',function(){
            var count=a.value.length

            if (count>200){
                a.value=a.value.substring(0,200)
                count=200
            }
            e.textContent=count+"/200"
            
        })


        c.addEventListener('click',function(){
            a.value=""
            e.textContent="0/200"
        })

        b.addEventListener("click",function(){
            d.textContent="Message Copied!"
            d.style.color="Green"

            setTimeout(function(){
                d.textContent=""
            },2000);
        })

    </script>
</body>

</html>
